server {
    listen 80;
    server_name _;

    # 🔥 penting supaya redirect tidak hilang port
    port_in_redirect off;
    absolute_redirect off;

    root /var/www/html/src/public;
    index index.php index.html;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;

        # koneksi ke PHP-FPM container
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        # path script
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # 🔥 INI YANG PALING PENTING (fix port redirect)
        fastcgi_param HTTP_HOST $http_host;

        # tambahan biar Laravel tahu environment
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param REQUEST_SCHEME $scheme;

        # performance tuning
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 300;
    }

    # blok akses file sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # upload limit
    client_max_body_size 100M;

    # cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        access_log off;
    }
}

