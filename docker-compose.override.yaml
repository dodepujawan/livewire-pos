services:
  app:
    user: "1000:1000"   # ✅ biar tidak permission error di VS Code lokal
    volumes:
      - ./src:/var/www/html/src
      - ./logs/php:/var/log/php
  web:
    ports:
      - "8002:80"   # ✏️ Ubah ⬅️ hanya aktif di local 
  nginxproxymanager:
    ports:
      - "8082:81"   # ✏️ Ubah GUI NPM local (akses http://127.0.0.1:8082)
    restart: "no"        # ⬅️ di lokal: biar gak auto hidup terus
  # ❌ Matikan MySQL di LOCAL
  db:
    image: alpine:3.20
    command: ["sh", "-c", "exit 0"]
    ports: []
    volumes: []

